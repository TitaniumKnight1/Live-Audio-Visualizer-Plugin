# Build Windows DLL on each published GitHub Release and attach artifacts.
name: Release (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_tag:
        description: "Upload built files to this existing release tag (e.g. v1.0.1). Leave empty to build only."
        required: false
        default: ""
      build_ref:
        description: "Git ref to compile (branch, tag, or SHA). Use main for latest CI-capable tree. When upload_tag is set, defaults to main so old release tags (without .github/scripts) still work."
        required: false
        default: "main"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build and upload Windows artifacts
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            "ref=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
            "upload_tag=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } elseif ('${{ inputs.upload_tag }}' -ne '') {
            # Build from build_ref (usually main): upload_tag may be an older release whose commit lacks CI files.
            $buildRef = '${{ inputs.build_ref }}'.Trim()
            if ([string]::IsNullOrWhiteSpace($buildRef)) { $buildRef = 'main' }
            "ref=$buildRef" >> $env:GITHUB_OUTPUT
            "upload_tag=${{ inputs.upload_tag }}" >> $env:GITHUB_OUTPUT
            Write-Host "Will build ref: $buildRef and attach artifacts to release: ${{ inputs.upload_tag }}"
          } else {
            "ref=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            "upload_tag=" >> $env:GITHUB_OUTPUT
          }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Build plugin (Windows x64)
        env:
          CI: "true"
        run: |
          $root = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $script = [System.IO.Path]::GetFullPath((Join-Path $root '.github\scripts\Build-Windows.ps1'))
          Write-Host "Building from repo root: $root"
          Write-Host "Build script path: $script"
          if (-not (Test-Path -LiteralPath $script)) {
            Write-Host "::error::Missing .github/scripts (cmake CI was added after this commit). For an existing old release: run workflow_dispatch with upload_tag=<release> and build_ref=main (default). Or publish a new tag from current main."
            if (Test-Path (Join-Path $root '.github')) {
              Get-ChildItem -LiteralPath (Join-Path $root '.github') -Recurse -File | Select-Object -First 40 FullName
            } else {
              Write-Host "No .github directory in checkout."
            }
            exit 1
          }
          pwsh -NoProfile -File $script -Target x64 -Configuration RelWithDebInfo

      - name: Stage release files
        run: |
          $root = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          New-Item -ItemType Directory -Force -Path (Join-Path $root 'release-artifacts') | Out-Null
          $dll = Join-Path $root 'build_x64\RelWithDebInfo\audio-visualizer.dll'
          $dll = [System.IO.Path]::GetFullPath($dll)
          if (-not (Test-Path -LiteralPath $dll)) { throw "Expected DLL not found: $dll" }
          Copy-Item -LiteralPath $dll (Join-Path $root 'release-artifacts\audio-visualizer.dll')
          $ini = Join-Path $root 'data\locale\en-US.ini'
          Copy-Item -LiteralPath ([System.IO.Path]::GetFullPath($ini)) (Join-Path $root 'release-artifacts\en-US.ini')

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_tag != '') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ref.outputs.upload_tag }}"
          if (-not $tag) { throw "No release tag resolved for upload." }
          $root = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          gh release upload $tag `
            (Join-Path $root 'release-artifacts\audio-visualizer.dll') `
            (Join-Path $root 'release-artifacts\en-US.ini') `
            --clobber `
            --repo "${{ github.repository }}"
